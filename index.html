<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="4メモ">
<title>4メモ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  background: #fff;
  touch-action: manipulation;
}
.grid {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  gap: 6px; padding: 6px; padding-top: calc(env(safe-area-inset-top, 0px) + 6px);
  height: 100%; width: 100%;
}
.quad {
  border-radius: 14px; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
  overflow: hidden; position: relative;
  border-width: 1.5px; border-style: solid;
}
.q1 { background: #FEF2F2; border-color: #FECACA; }
.q2 { background: #FFFBEB; border-color: #FDE68A; }
.q3 { background: #EFF6FF; border-color: #BFDBFE; }
.q4 { background: #F9FAFB; border-color: #E5E7EB; }
.qlabel { font-size: 12px; font-weight: 700; letter-spacing: 0.02em; flex-shrink: 0; }
.q1 .qlabel { color: #DC2626; }
.q2 .qlabel { color: #D97706; }
.q3 .qlabel { color: #2563EB; }
.q4 .qlabel { color: #6B7280; }
.items {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
  min-height: 0; -webkit-overflow-scrolling: touch;
}
.item {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; line-height: 1.35; color: #1F2937;
  padding: 3px 0;
}
.item-text { flex: 1; word-break: break-word; }
.item-btn {
  background: none; border: none;
  padding: 4px; font-size: 15px; color: #9CA3AF;
  flex-shrink: 0; line-height: 1;
  min-width: 28px; min-height: 28px;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.item-btn:active { color: #374151; }
.add-row { display: flex; gap: 5px; flex-shrink: 0; }
.add-input {
  flex: 1; padding: 5px 8px; border-radius: 8px;
  font-size: 13px; outline: none; color: #1F2937;
  background: #fff; min-width: 0; font-family: inherit;
  border-width: 1px; border-style: solid;
}
.q1 .add-input { border-color: #FECACA; }
.q2 .add-input { border-color: #FDE68A; }
.q3 .add-input { border-color: #BFDBFE; }
.q4 .add-input { border-color: #E5E7EB; }
.add-btn {
  width: 30px; height: 30px; border: none; border-radius: 8px;
  color: #fff; font-size: 18px;
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; line-height: 1; font-family: inherit;
  touch-action: manipulation;
}
.q1 .add-btn { background: #DC2626; }
.q2 .add-btn { background: #D97706; }
.q3 .add-btn { background: #2563EB; }
.q4 .add-btn { background: #6B7280; }

/* Modal */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; touch-action: manipulation;
}
.modal {
  background: #fff; border-radius: 14px; padding: 16px;
  width: 260px; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.modal-title {
  font-size: 14px; font-weight: 700; color: #1F2937;
  margin-bottom: 12px; text-align: center;
  word-break: break-word;
}
.modal-btn {
  display: block; width: 100%; text-align: center;
  padding: 10px; border: none; background: none;
  font-size: 14px; color: #374151;
  border-radius: 8px; font-family: inherit;
  touch-action: manipulation;
}
.modal-btn:active { background: #F3F4F6; }
.modal-cancel {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid #E5E7EB;
  color: #9CA3AF;
}
</style>
</head>
<body>

<div class="grid" id="app"></div>
<div id="modal-root"></div>

<script>
var QS = [
  { id:"q1", label:"🔴 緊急 × 重要", cls:"q1" },
  { id:"q2", label:"🟡 重要", cls:"q2" },
  { id:"q3", label:"🔵 緊急", cls:"q3" },
  { id:"q4", label:"⚪ あとで", cls:"q4" }
];

var KEY = "qmemo";
var data;
try { data = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { data = {}; }
QS.forEach(function(q) { if (!data[q.id]) data[q.id] = []; });

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}

function showMoveModal(fromQId, item) {
  var root = document.getElementById("modal-root");
  var bg = document.createElement("div");
  bg.className = "modal-bg";

  var modal = document.createElement("div");
  modal.className = "modal";

  var title = document.createElement("div");
  title.className = "modal-title";
  title.textContent = "「" + item.text + "」を移動";
  modal.appendChild(title);

  QS.forEach(function(oq) {
    if (oq.id === fromQId) return;
    var btn = document.createElement("button");
    btn.className = "modal-btn";
    btn.textContent = oq.label + " へ";
    btn.ontouchend = function(e) { e.preventDefault(); doMove(fromQId, item.id, oq.id); };
    btn.onclick = function() { doMove(fromQId, item.id, oq.id); };
    modal.appendChild(btn);
  });

  var cancel = document.createElement("button");
  cancel.className = "modal-btn modal-cancel";
  cancel.textContent = "キャンセル";
  cancel.ontouchend = function(e) { e.preventDefault(); closeModal(); };
  cancel.onclick = function() { closeModal(); };
  modal.appendChild(cancel);

  bg.ontouchend = function(e) { if (e.target === bg) { e.preventDefault(); closeModal(); } };
  bg.onclick = function(e) { if (e.target === bg) closeModal(); };

  bg.appendChild(modal);
  root.innerHTML = "";
  root.appendChild(bg);
}

function doMove(fromQId, itemId, toQId) {
  var item = null;
  data[fromQId] = data[fromQId].filter(function(x) {
    if (x.id === itemId) { item = x; return false; }
    return true;
  });
  if (item) data[toQId].push(item);
  save(); closeModal(); render();
}

function doDelete(qId, itemId) {
  data[qId] = data[qId].filter(function(x) { return x.id !== itemId; });
  save(); render();
}

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";

  QS.forEach(function(q) {
    var div = document.createElement("div");
    div.className = "quad " + q.cls;

    var lbl = document.createElement("div");
    lbl.className = "qlabel";
    lbl.textContent = q.label;
    div.appendChild(lbl);

    var items = document.createElement("div");
    items.className = "items";

    data[q.id].forEach(function(item) {
      var row = document.createElement("div");
      row.className = "item";

      var txt = document.createElement("span");
      txt.className = "item-text";
      txt.textContent = item.text;
      row.appendChild(txt);

      // move button
      var moveBtn = document.createElement("button");
      moveBtn.className = "item-btn";
      moveBtn.textContent = "↗";
      moveBtn.ontouchend = function(e) { e.preventDefault(); e.stopPropagation(); showMoveModal(q.id, item); };
      moveBtn.onclick = function(e) { e.stopPropagation(); showMoveModal(q.id, item); };
      row.appendChild(moveBtn);

      // delete button
      var delBtn = document.createElement("button");
      delBtn.className = "item-btn";
      delBtn.textContent = "✕";
      delBtn.style.color = "#EF4444";
      delBtn.ontouchend = function(e) { e.preventDefault(); e.stopPropagation(); doDelete(q.id, item.id); };
      delBtn.onclick = function(e) { e.stopPropagation(); doDelete(q.id, item.id); };
      row.appendChild(delBtn);

      items.appendChild(row);
    });
    div.appendChild(items);

    var addRow = document.createElement("div");
    addRow.className = "add-row";
    var input = document.createElement("input");
    input.type = "text";
    input.className = "add-input";
    input.placeholder = "追加...";
    input.enterKeyHint = "done";

    var addBtn = document.createElement("button");
    addBtn.className = "add-btn";
    addBtn.textContent = "+";

    var doAdd = function() {
      var t = input.value.trim();
      if (!t) return;
      data[q.id].push({ id: uid(), text: t });
      save(); render();
    };

    input.addEventListener("keydown", function(e) { if (e.key === "Enter") doAdd(); });
    addBtn.ontouchend = function(e) { e.preventDefault(); doAdd(); };
    addBtn.onclick = function() { doAdd(); };
    addRow.appendChild(input);
    addRow.appendChild(addBtn);
    div.appendChild(addRow);

    app.appendChild(div);
  });
}

render();
</script>
</body>
</html>
